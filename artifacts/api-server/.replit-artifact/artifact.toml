kind = "api"
previewPath = "/"
title = "Beezy Multi-Agent System"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/"]

[services.development]
run = "cd /home/runner/workspace && uvicorn app.main:app --reload --port $PORT"

[services.production]

[services.production.run]
args = ["bash", "-c", "cd /home/runner/workspace && uvicorn app.main:app --host 0.0.0.0 --port 8080"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/healthz"
